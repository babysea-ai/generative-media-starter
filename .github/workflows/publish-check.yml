name: Package Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  starter:
    name: generative-media-starter package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3011
      BABYSEA_API_KEY: bye_ci
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_PUBLIC_KEY: ci
      SUPABASE_SECRET_KEY: ci
      UPSTASH_REDIS_REST_URL: https://ci.example.com
      UPSTASH_REDIS_REST_TOKEN: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile --ignore-workspace
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm build

