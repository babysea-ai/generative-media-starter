# Netlify build configuration for generative-media-starter.
# The official @netlify/plugin-nextjs runtime is auto-installed for Next.js
# projects on Netlify and handles SSR, route handlers, and the Next.js
# proxy/middleware on Netlify Functions. No edge-runtime conversion is
# required, so the Supabase auth-refresh proxy works unmodified.

[build]
  command = "pnpm install --frozen-lockfile --ignore-workspace && pnpm build"
  publish = ".next"

[build.environment]
  # Match package.json `engines.node`.
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  # Force Netlify to use pnpm (it auto-detects from pnpm-lock.yaml,
  # but this is explicit for clarity).
  PNPM_FLAGS = "--ignore-workspace"
